<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ATIG</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000510">
<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000510;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Raleway',sans-serif;overflow:hidden;color:#fff}
.cosmos{position:fixed;inset:0;background:radial-gradient(ellipse 100% 60% at 50% 40%,#0a1a3e 0%,transparent 60%),#000208}
.milkyway{position:absolute;inset:0;background:radial-gradient(ellipse 140% 25% at 50% 52%,rgba(120,160,255,0.12) 0%,transparent 70%);transform:rotate(-12deg) scale(1.6)}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite var(--delay)}
@keyframes tw{0%,100%{opacity:var(--lo)}50%{opacity:var(--hi)}}
.page{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;width:100%;max-width:480px;padding:20px}
.title{font-size:13px;font-weight:300;letter-spacing:7px;color:rgba(200,230,255,0.6);text-transform:uppercase;margin-bottom:30px;opacity:0;animation:fi 2s ease forwards 0.5s}
@keyframes fi{to{opacity:1}}
.sphere{position:relative;width:240px;height:240px;cursor:pointer;margin-bottom:30px}
.orbit{position:absolute;border-radius:50%;border:1.5px solid rgba(100,190,255,0.35);top:50%;left:50%}
.o1{width:240px;height:90px;margin-left:-120px;margin-top:-45px;animation:ob1 5s linear infinite}
.o2{width:200px;height:76px;margin-left:-100px;margin-top:-38px;animation:ob2 7s linear infinite}
.o3{width:170px;height:64px;margin-left:-85px;margin-top:-32px;animation:ob3 9s linear infinite}
@keyframes ob1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ob2{from{transform:rotate(55deg)}to{transform:rotate(415deg)}}
@keyframes ob3{from{transform:rotate(-55deg)}to{transform:rotate(305deg)}}
.electron{position:absolute;width:5px;height:5px;border-radius:50%;background:#fff;box-shadow:0 0 5px #fff,0 0 10px #7dd3fc;top:50%;left:50%;margin:-2.5px 0 0 -2.5px}
.nucleus{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:55px;height:55px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff 0%,#bae6fd 30%,#38bdf8 60%,#0c4a6e 100%);box-shadow:0 0 20px rgba(125,211,252,0.9),0 0 50px rgba(56,189,248,0.6),0 0 100px rgba(14,165,233,0.4);animation:np 3s ease-in-out infinite;transition:all 0.5s}
@keyframes np{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.08)}}
.sphere.listening .nucleus{background:radial-gradient(circle at 35% 35%,#fff 0%,#fecaca 30%,#ef4444 60%,#7f1d1d 100%);box-shadow:0 0 30px rgba(252,165,165,1),0 0 60px rgba(239,68,68,0.7);animation:lp 1s ease-in-out infinite}
.sphere.speaking .nucleus{background:radial-gradient(circle at 35% 35%,#fff 0%,#bbf7d0 30%,#22c55e 60%,#14532d 100%);box-shadow:0 0 30px rgba(134,239,172,1),0 0 60px rgba(34,197,94,0.7);animation:sp 0.6s ease-in-out infinite}
@keyframes lp{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.12)}}
@keyframes sp{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.06)}}
.status{text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.msg{font-size:18px;font-weight:300;color:#fff;letter-spacing:1.5px;line-height:1.6;opacity:0;transform:translateY(10px);transition:all 0.5s;text-align:center;max-width:320px}
.msg.show{opacity:1;transform:translateY(0)}
.hint{font-size:9px;letter-spacing:5px;color:rgba(125,211,252,0.25);text-transform:uppercase}
.wave{display:flex;gap:4px;align-items:center;height:24px;opacity:0;transition:opacity 0.3s}
.wave.show{opacity:1}
.wb{width:3px;background:rgba(252,165,165,0.7);border-radius:3px;animation:wa var(--s) ease-in-out infinite alternate}
@keyframes wa{from{height:3px}to{height:22px}}
.langs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:340px;margin-top:16px}
.pill{padding:5px 14px;border:1px solid rgba(125,211,252,0.3);border-radius:20px;font-size:11px;font-family:'Raleway',sans-serif;color:rgba(125,211,252,0.6);cursor:pointer;transition:all 0.2s;background:rgba(0,0,0,0.4);letter-spacing:1px}
.pill:hover{border-color:rgba(125,211,252,0.7);color:rgba(125,211,252,1);background:rgba(14,60,120,0.3)}
.navbtns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;opacity:0;pointer-events:none;transition:all 0.6s;margin-top:16px}
.navbtns.show{opacity:1;pointer-events:auto}
.nbtn{padding:7px 18px;border:1px solid rgba(125,211,252,0.2);border-radius:25px;font-family:'Raleway',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(125,211,252,0.5);background:rgba(0,0,0,0.4);cursor:pointer;transition:all 0.3s;text-transform:uppercase}
.nbtn:hover{border-color:rgba(125,211,252,0.6);color:rgba(125,211,252,1)}
</style>
</head>
<body>
<div class="cosmos">
  <div class="milkyway"></div>
  <div id="stars"></div>
</div>
<div class="page">
  <div class="title">Приветствие АТИГ</div>
  <div class="sphere" id="sphere">
    <div class="orbit o1"><div class="electron" id="e1"></div></div>
    <div class="orbit o2"><div class="electron" id="e2"></div></div>
    <div class="orbit o3"><div class="electron" id="e3"></div></div>
    <div class="nucleus"></div>
  </div>
  <div class="status">
    <div class="msg show" id="msg">Нажмите на сферу</div>
    <div class="wave" id="wave">
      <div class="wb" style="--s:.3s"></div>
      <div class="wb" style="--s:.5s"></div>
      <div class="wb" style="--s:.4s"></div>
      <div class="wb" style="--s:.6s"></div>
      <div class="wb" style="--s:.35s"></div>
      <div class="wb" style="--s:.5s"></div>
    </div>
    <div class="hint" id="hint">ATIG · ОЖИДАНИЕ</div>
  </div>
  <div class="langs">
    <span class="pill" id="btn-privet">Привет</span>
    <span class="pill" id="btn-zdravstvujte">Здравствуйте</span>
    <span class="pill" id="btn-hello">Hello</span>
    <span class="pill" id="btn-salam">Салам</span>
    <span class="pill" id="btn-nihao">你好</span>
    <span class="pill" id="btn-utro">Доброе утро</span>
    <span class="pill" id="btn-vecher">Добрый вечер</span>
    <span class="pill" id="btn-poka">Пока</span>
  </div>
  <div class="navbtns" id="navbtns">
    <button class="nbtn" id="btn-about">О проекте</button>
    <button class="nbtn" id="btn-mission">Миссия</button>
    <button class="nbtn" id="btn-contact">Связаться</button>
  </div>
</div>

<script>
(function() {

// Звёзды
var st = document.getElementById('stars');
for (var i = 0; i < 200; i++) {
  var s = document.createElement('div');
  s.className = 'star';
  var sz = Math.random() * 2 + 0.4;
  s.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;--d:' + (2+Math.random()*7) + 's;--delay:-' + (Math.random()*5) + 's;--lo:' + (0.05+Math.random()*0.2) + ';--hi:' + (0.4+Math.random()*0.5) + ';';
  st.appendChild(s);
}

// Электроны
var t = 0;
setInterval(function() {
  t += 0.018;
  var e1 = document.getElementById('e1');
  var e2 = document.getElementById('e2');
  var e3 = document.getElementById('e3');
  if (e1) e1.style.transform = 'translate(' + (Math.cos(t)*118) + 'px,' + (Math.sin(t)*43) + 'px) translate(-50%,-50%)';
  if (e2) e2.style.transform = 'translate(' + (Math.cos(-t*0.75)*98) + 'px,' + (Math.sin(-t*0.75)*36) + 'px) translate(-50%,-50%)';
  if (e3) e3.style.transform = 'translate(' + (Math.cos(t*0.55+2)*83) + 'px,' + (Math.sin(t*0.55+2)*30) + 'px) translate(-50%,-50%)';
}, 16);

// Словарь
var GREETINGS = [
  {re:/привет|хай/i, say:['Привет!','Привет-привет!','Рад тебя слышать!']},
  {re:/здравствуй/i, say:['Здравствуйте!','Здравствуй!']},
  {re:/доброе утро/i, say:['Доброе утро!','Утро доброе!']},
  {re:/добрый день/i, say:['Добрый день!']},
  {re:/добрый вечер/i, say:['Добрый вечер!','Вечер добрый!']},
  {re:/салам/i, say:['Салам!','Салам-салам!']},
  {re:/hello|hi|hey/i, say:['Hello!','Hi there!']},
  {re:/你好/i, say:['你好！']},
  {re:/пока|bye/i, say:['До свидания!','Пока! Возвращайся.']},
];

var INFO = {
  about: 'ATIG — глобальная платформа для сохранения человеческой памяти и наследия. От рождения до вечности.',
  mission: 'Миссия ATIG — сделать каждого человека лучше. Свет вселенной. Вечность.',
  contact: 'Для связи с командой ATIG — посетите сайт atig.ai',
};

function isGreeting(text) {
  for (var i = 0; i < GREETINGS.length; i++) {
    if (GREETINGS[i].re.test(text)) return true;
  }
  return false;
}

function getReply(text) {
  for (var i = 0; i < GREETINGS.length; i++) {
    if (GREETINGS[i].re.test(text)) {
      var arr = GREETINGS[i].say;
      return arr[Math.floor(Math.random() * arr.length)];
    }
  }
  return null;
}

// Элементы
var sphereEl = document.getElementById('sphere');
var msgEl    = document.getElementById('msg');
var hintEl   = document.getElementById('hint');
var waveEl   = document.getElementById('wave');
var navbtns  = document.getElementById('navbtns');

var state      = 'idle';
var greeted    = false;
var listenTimer = null;
var autoTimer   = null;
var recog       = null;

var hasMic = ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window);

function showMsg(text) {
  msgEl.classList.remove('show');
  setTimeout(function() {
    msgEl.textContent = text;
    msgEl.classList.add('show');
  }, 150);
}

function setState(s) {
  state = s;
  if (s === 'idle') sphereEl.className = 'sphere';
  else sphereEl.className = 'sphere ' + s;
  if (s === 'listening') waveEl.className = 'wave show';
  else waveEl.className = 'wave';
  var hints = {idle:'ATIG · ОЖИДАНИЕ', listening:'ATIG · СЛУШАЕТ', speaking:'ATIG · ГОВОРИТ'};
  hintEl.textContent = hints[s] || '';
}

function speak(text, onDone) {
  if (!window.speechSynthesis) {
    setTimeout(onDone || function(){}, 2000);
    return;
  }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  if (/你好/.test(text)) u.lang = 'zh-CN';
  else u.lang = 'ru-RU';
  u.rate = 0.95;
  u.pitch = 1.05;
  u.volume = 1;
  u.onend = onDone || function(){};
  u.onerror = onDone || function(){};
  window.speechSynthesis.speak(u);
}

function afterGreeting() {
  greeted = true;
  setState('idle');
  navbtns.classList.add('show');
  scheduleListen(1500);
}

function respond(text) {
  clearTimeout(listenTimer);
  clearTimeout(autoTimer);
  if (recog) { try { recog.abort(); } catch(e){} recog = null; }

  if (isGreeting(text)) {
    var reply = getReply(text);
    setState('speaking');
    showMsg(reply);
    speak(reply, function() {
      if (!greeted) {
        setTimeout(function() {
          setState('speaking');
          var intro = 'Я — ATIG. Персональный интеллект нового поколения. Рад приветствовать вас.';
          showMsg(intro);
          speak(intro, afterGreeting);
        }, 400);
      } else {
        setState('idle');
        showMsg('...');
        scheduleListen(800);
      }
    });
  } else {
    scheduleListen(500);
  }
}

function scheduleListen(d) {
  clearTimeout(listenTimer);
  listenTimer = setTimeout(startListening, d || 800);
}

function startListening() {
  if (state === 'speaking') return;
  if (!hasMic) { setState('listening'); showMsg('Нажми на кнопку ниже'); return; }
  if (recog) { try { recog.abort(); } catch(e){} recog = null; }
  setState('listening');
  showMsg(greeted ? '...' : 'ATIG слушает…');
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var r = new SR();
  r.lang = 'ru-RU';
  r.continuous = false;
  r.interimResults = false;
  r.onresult = function(e) { recog = null; respond(e.results[0][0].transcript); };
  r.onerror  = function()  { recog = null; if (state !== 'speaking') scheduleListen(1000); };
  r.onend    = function()  { recog = null; if (state !== 'speaking') scheduleListen(600); };
  try { r.start(); recog = r; } catch(e) { scheduleListen(1500); }
}

function handleTap() {
  clearTimeout(autoTimer);
  if (state === 'speaking') return;
  clearTimeout(listenTimer);
  if (recog) { try { recog.abort(); } catch(e){} recog = null; }
  // Разблокировка звука
  window.speechSynthesis.cancel();
  startListening();
}

function manualGreet(word) {
  clearTimeout(listenTimer);
  clearTimeout(autoTimer);
  if (recog) { try { recog.abort(); } catch(e){} recog = null; }
  // Разблокировка звука при нажатии
  window.speechSynthesis.cancel();
  respond(word);
}

// Привязка кнопок
sphereEl.addEventListener('click', handleTap);
document.getElementById('btn-privet').addEventListener('click', function(){ manualGreet('Привет'); });
document.getElementById('btn-zdravstvujte').addEventListener('click', function(){ manualGreet('Здравствуйте'); });
document.getElementById('btn-hello').addEventListener('click', function(){ manualGreet('Hello'); });
document.getElementById('btn-salam').addEventListener('click', function(){ manualGreet('Салам'); });
document.getElementById('btn-nihao').addEventListener('click', function(){ manualGreet('你好'); });
document.getElementById('btn-utro').addEventListener('click', function(){ manualGreet('Доброе утро'); });
document.getElementById('btn-vecher').addEventListener('click', function(){ manualGreet('Добрый вечер'); });
document.getElementById('btn-poka').addEventListener('click', function(){ manualGreet('Пока'); });
document.getElementById('btn-about').addEventListener('click', function(){
  setState('speaking'); showMsg(INFO.about); speak(INFO.about, function(){ setState('idle'); showMsg('...'); scheduleListen(1000); });
});
document.getElementById('btn-mission').addEventListener('click', function(){
  setState('speaking'); showMsg(INFO.mission); speak(INFO.mission, function(){ setState('idle'); showMsg('...'); scheduleListen(1000); });
});
document.getElementById('btn-contact').addEventListener('click', function(){
  setState('speaking'); showMsg(INFO.contact); speak(INFO.contact, function(){ setState('idle'); showMsg('...'); scheduleListen(1000); });
});

// Автоприветствие через 15 сек
autoTimer = setTimeout(function() {
  if (state === 'idle' && !greeted) {
    setState('speaking');
    var m = 'Здравствуйте. Если хотите познакомиться — нажмите на сферу или кнопку ниже.';
    showMsg(m);
    speak(m, function() { setState('idle'); showMsg('Нажмите на сферу'); });
  }
}, 15000);

// Старт
setState('idle');
showMsg('Нажмите на сферу');
msgEl.classList.add('show');

})();
</script>
</body>
</html>
